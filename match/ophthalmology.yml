global_vars:
  - name: today
    type: date
    params:
      format: "%Y%m%d"

matches:
  # Clinic templates
  - trigger: ";init"
    force_mode: clipboard
    replace: |
      VA:
      Eyelid: dermatochalasis OU, MRD1:$|$, LF:
      Conj: mild congested OU,
      Cornea: clear OU
      AC: clear and formed OU
      Lens: clear OU
      CDR:
      Fundus: no DR signs, no retinal break OU
      OCT: flat macula OU

  - trigger: ";hx"
    replace: "DM- HTN- Allergy-"

  - trigger: ";date"
    replace: "{{today}}"

  - trigger: ";sch"
    replace: "Schirmer test<5mm OU"

  - trigger: ";cor"
    replace: "{{today}} Cornea: $|$"

  - trigger: ";fag"
    replace: "{{today}} FAG: early phase, $|$, late phase"

  - trigger: ";oct"
    replace: "{{today}} OCT: flat macula OU, intact RNFL OU"

  - trigger: ";moct"
    replace: "{{today}} OCT(M): flat macula OU"

  - trigger: ";goct"
    replace: "{{today}} OCT(G): intact RNFL OU"

  - trigger: ";fd"
    replace: "{{today}} Fd: $|$"

  - trigger: ";vf"
    replace: "{{today}} VF 24-2 MD: $|$ / db."

  - trigger: ";iviod"
    replace: ", IVI-$|$ OD {{today}}"

  - trigger: ";ivios"
    replace: ", IVI-$|$ OS {{today}}"

  - trigger: ";iviou"
    replace: ", IVI-$|$ OU {{today}}"

  - trigger: ";ntdil"
    replace: "- arrange dilated exam NT"

  - trigger: ";ntcata"
    replace: "- arrange CATA survey NT"

  - trigger: ";cataod"
    force_mode: clipboard
    replace: |
      - arrange CATA (please explain NHI/EDOF/Trifocal) OD on {{today}}?. TEL: $|$
      - GL before? driving? night driving? bus? TV? computer? cellphone? book?

  - trigger: ";cataos"
    force_mode: clipboard
    replace: |
      - arrange CATA (please explain NHI/EDOF/Trifocal) OS on {{today}}?. TEL: $|$
      - GL before? driving? night driving? bus? TV? computer? cellphone? book?

  - trigger: ";cataou"
    force_mode: clipboard
    replace: |
      - arrange CATA (please explain NHI/EDOF/Trifocal) OU on {{today}}?. TEL: $|$
      - GL before? driving? night driving? bus? TV? computer? cellphone? book?

  - trigger: ";lensxod"
    force_mode: clipboard
    replace: |
      - arrange LenSx+CATA (please explain NHI/EDOF/Trifocal) OD on {{today}}?. TEL: $|$
      - GL before? driving? night driving? bus? TV? computer? cellphone? book?

  - trigger: ";lensxos"
    force_mode: clipboard
    replace: |
      - arrange LenSx+CATA (please explain NHI/EDOF/Trifocal) OS on {{today}}?. TEL: $|$
      - GL before? driving? night driving? bus? TV? computer? cellphone? book?

  - trigger: ";lensxou"
    force_mode: clipboard
    replace: |
      - arrange LenSx+CATA (please explain NHI/EDOF/Trifocal) OU on {{today}}?. TEL: $|$
      - GL before? driving? night driving? bus? TV? computer? cellphone? book?

  - trigger: ";ntgs"
    replace: "- arrange VF 24-2/30-2$|$ NT"

  - trigger: ";ntvf"
    replace: "- arrange VF 24-2/30-2? NT"

  - trigger: ";ntfag"
    replace: "- arrange FAG NT"

  - trigger: ";nticg"
    replace: "- arrange FAG+ICG NT"

  - trigger: ";acata"
    replace: "- APPLY Cataract (OD/OS/OU)? {{today}}"

  - trigger: ";ablue"
    replace: "- APPLY Trypan blue (OD/OS/OU)? {{today}}"

  - trigger: ";aivi"
    replace: "- APPLY IVI-(E2/E8/V/L/O)? {{today}}"

  - trigger: ";vt"
    replace: "- arrange VT on {{today}}"

  - trigger: ";mp"
    replace: "- arrange VT+MP(sharkskin+TWIN) on {{today}}"

  - trigger: ";pvd"
    replace: "- Explain warning signs of retinal tear/detachment. Return to OPD/ER immediately if flashes, floaters, or visual field defect worsen."

  - trigger: ";dr"
    replace: "- Suggest blood sugar and blood pressure control."

  - trigger: ";ded"
    force_mode: clipboard
    replace: |
      - try ONSD/AT + fox TID OU + ery/vidisc/dura HS OU
      - suggest warm compression BID OU

